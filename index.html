<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室</title>
    <style>
        /* 1. 背景は薄いグレー */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f3f4f6; /* 薄いグレー */
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        /* 2. 画面中央に大きな文字 */
        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        /* 3. 『実験を開始する』という青いボタン */
        .start-button {
            background-color: #2563eb; /* 青色 */
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .start-button:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .start-button:active {
            transform: translateY(0);
        }

        /* アラートの代わりになるカスタムメッセージボックス用スタイル */
        #custom-alert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            text-align: center;
            min-width: 300px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
        }

        .close-btn {
            margin-top: 1.5rem;
            background: #e5e7eb;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>心理学実験室へようこそ</h1>
        <button class="start-button" id="startBtn">実験を開始する</button>
    </div>

    <!-- カスタムメッセージボックス（ブラウザのalertの代わり） -->
    <div class="overlay" id="overlay"></div>
    <div id="custom-alert">
        <p style="font-size: 1.5rem; margin: 0;">Hello World!</p>
        <button class="close-btn" id="closeBtn">閉じる</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('startBtn');
            const customAlert = document.getElementById('custom-alert');
            const overlay = document.getElementById('overlay');
            const closeBtn = document.getElementById('closeBtn');

            // 4. ボタンを押すとメッセージを表示
            startBtn.addEventListener('click', () => {
                // 通常のalert()の代わりに、よりモダンなUIを表示します
                customAlert.style.display = 'block';
                overlay.style.display = 'block';
            });

            closeBtn.addEventListener('click', () => {
                customAlert.style.display = 'none';
                overlay.style.display = 'none';
            });

            overlay.addEventListener('click', () => {
                customAlert.style.display = 'none';
                overlay.style.display = 'none';
            });
        });
    </script>
</body>
</html>
